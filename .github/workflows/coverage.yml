name: Coverage

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend: [sqlite, inmemory, postgres]
      fail-fast: false
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        id: nix
        with:
          signing-key: ${{ secrets.NIX_CACHE_SIGNING_KEY }}

      - name: Build coverage
        run: |
          nix-fast-build --skip-cached --no-nom --no-link \
            ${{ steps.nix.outputs.push-args }} \
            -f '.#legacyPackages.x86_64-linux.coverage.${{ matrix.backend }}'

      - name: Extract coverage data
        run: |
          mkdir -p coverage
          cp "$(nix path-info '.#coverage.${{ matrix.backend }}')/lcov.info" coverage/lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.backend }}
          files: coverage/lcov.info
          fail_ci_if_error: false
