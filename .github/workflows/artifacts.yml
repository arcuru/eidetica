name: Artifacts

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  artifacts:
    name: Artifacts (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
      fail-fast: false
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        id: nix
        with:
          signing-key: ${{ secrets.NIX_CACHE_SIGNING_KEY }}

      - name: Build and push artifacts
        run: |
          nix-fast-build --skip-cached --no-nom --no-link \
            ${{ steps.nix.outputs.push-args }} \
            -f '.#legacyPackages.${{ matrix.system }}.eidetica.bin'
          nix-fast-build --skip-cached --no-nom --no-link \
            ${{ steps.nix.outputs.push-args }} \
            -f '.#legacyPackages.${{ matrix.system }}.eidetica.image'

      - name: Install Bencher CLI
        uses: bencherdev/bencher@8151077aa7b1bceaac11c4b308265417cae60e2b # v0.5.10

      - name: Track Binary Size
        if: github.repository_owner == 'arcuru'
        run: |
          BINARY_PATH=$(nix build .#eidetica.bin --no-link --print-out-paths)/bin/eidetica
          bencher run \
            --project eidetica \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --branch main \
            --testbed '${{ matrix.system }}' \
            --file-size "$BINARY_PATH" \
            --adapter json \
            "echo '{}'"

      - name: Track Container Size
        if: github.repository_owner == 'arcuru'
        run: |
          IMAGE_PATH=$(nix build .#eidetica.image --no-link --print-out-paths)
          bencher run \
            --project eidetica \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --branch main \
            --testbed '${{ matrix.system }}' \
            --file-size "$IMAGE_PATH" \
            --adapter json \
            "echo '{}'"
