# Maintains the release-plz "release PR" (version bumps + changelog) on every
# push to main. No secrets, no publish, no environment gate — the human review
# of this PR is the approval gate for what gets released. The actual publish
# happens in release-plz-release.yml when this PR is merged.
name: Release-plz PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-pr:
    name: Release-plz PR
    runs-on: ubicloud-standard-2
    if: ${{ github.repository_owner == 'arcuru' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Check if release PR exists
        id: check-pr
        if: github.event_name == 'push'
        run: |
          PR_EXISTS=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,headRefName --jq '[.[] | select(.headRefName | startswith("release-plz"))] | length')
          echo "exists=$PR_EXISTS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release-plz
        if: github.event_name == 'workflow_dispatch' || steps.check-pr.outputs.exists != '0'
        uses: release-plz/action@f708778669256143d984cce4b23592637532e040 # v0.5.127
        with:
          command: release-pr
          config: .config/release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
